image: python:3.9-alpine

stages:
  - test
  - deploy

test:
  stage: test
  image: julia:1.11
  script:
    - julia --project=. -e 'using Pkg; Pkg.instantiate(); Pkg.test()'

pages:
  stage: deploy
  script:
    - pip install -r docs/requirements.txt
    - mkdocs build
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
